version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-faculty_management}
      MYSQL_USER: ${DB_USER:-admin}
      MYSQL_PASSWORD: ${DB_PASSWORD:-admin_pwd}
    ports:
      - "4000:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    ports:
      - "${APP_BACKEND_PORT:-5000}:5000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=${DB_USER:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-admin_pwd}
      - DB_NAME=${DB_NAME:-faculty_management}
      - PORT=5000
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-supersecretkey}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-superrefreshkey}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/backend/uploads

  frontend:
    build: 
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Pass backend proxy address during build so Vite proxy configs resolve safely if needed
        - VITE_API_PROXY_TARGET=http://backend:5000
    restart: always
    ports:
      - "${APP_FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  db_data: