version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    ports:
      - "${APP_BACKEND_PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      # Database Configuration
      - DB_HOST=host.docker.internal
      - DB_USER=root
      - DB_PASSWORD=your_mysql_password
      - DB_NAME=faculty_management
      - DB_PORT=3306

      # Server Configuration
      - PORT=5000
      - NODE_ENV=development

      # JWT Configuration
      - JWT_SECRET=your_super_secret_jwt_key_here
      - JWT_REFRESH_SECRET=your_super_secret_refresh_key_here
      - JWT_EXPIRES_IN=1h
      - JWT_REFRESH_EXPIRES_IN=7d

      # Email Configuration
      - EMAIL_HOST=smtp.gmail.com
      - EMAIL_PORT=587
      - EMAIL_SECURE=false
      - EMAIL_USER=your_email@gmail.com
      - EMAIL_PASS=your_app_password_or_smtp_password
      - EMAIL_FROM=your_email@gmail.com

      # File Upload Configuration
      - MAX_UPLOAD_MB=25
    volumes:
      - ./backend/uploads:/app/backend/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Pass backend proxy address during build so Vite proxy configs resolve safely if needed
        - VITE_API_PROXY_TARGET=http://backend:5000
    restart: always
    ports:
      - "${APP_FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    environment:
      - VITE_DEV_SERVER_PORT=5173
      - VITE_API_PROXY_TARGET=http://localhost:5000
      - VITE_API_BASE_URL=